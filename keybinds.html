<html lang="en">

<head>
  <meta charset="utf-8">

  <link href="/assets/eggs.css" rel="stylesheet" type="text/css">

    gtag('config', 'G-EGBMJBFWQF');

  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta id="meta-title" property="og:title" content="Keybinds - Frosty Volcano Summit">

</head>

<body id="_bg">
  <header>Frosty Volcano Summit</header>
  <main>
    <div id="back"></div>
    <div class="egg" data-egg="fvsKeys_aboveTitle">
      <img class="egg-box" src="/images/hidden_block.png" alt="Egg - Hidden Block">
      <img class="egg-cracked" src="/images/moon.png" alt="Egg - Moon">
    </div>
    <div id="grassBox">
      <h1>Keybinds</h1>
      <p class="kb-list">
        <kbd>Ctrl</kbd><kbd>/</kbd> Open Keybind List<br>
        <kbd>Alt</kbd><kbd>S</kbd> Show Audio Controls<br>
        <kbd>Alt</kbd><kbd>H</kbd> Hide Audio Controls<br>
        <kbd>Ctrl</kbd><kbd>I</kbd> Install App<br>
      </p>
      <div class="egg" data-egg="fvsKeys_underInstallKey">
        <img class="egg-box" src="/images/hidden_block.png" alt="Egg - Hidden Block">
        <img class="egg-cracked" src="/images/moon.png" alt="Egg - Moon">
      </div>
      <p class="kb-list">
        <kbd>Ctrl</kbd><kbd>C</kbd> Copy Link<br>
        <kbd>Alt+L</kbd> View License<br>
        <kbd>Enter</kbd> Confirm Selection<br>
        <kbd>Alt+R</kbd> Reset Selection<br>
        <kbd>?</kbd> Random Selection<br>
        <kbd>X</kbd> Open Source Code<br>
        <kbd>Ctrl</kbd><kbd>Z</kbd> Reset All Eggs<br>
      </p>
      <div class="egg" data-egg="fvsKeybinds_underList">
        <img class="egg-box" src="/images/hidden_block.png" alt="Egg - Hidden Block">
        <img class="egg-cracked" src="/images/moon.png" alt="Egg - Moon">
      </div>
      <br>
      </p>
    </div>

    <form id="optForm"></form>
    <div class="flex">
      <div id="audctrls"></div>
      <div id="install"></div>
      <div id="copy"></div>
      <div id="resetEggs"></div>
    </div>
    <audio id="music"></audio>
    <div class="egg" data-egg="fvsKeybinds_underAudCtrls">
      <img class="egg-box" src="/images/hidden_block.png" alt="Egg - Hidden Block">
      <img class="egg-cracked" src="/images/moon.png" alt="Egg - Moon">
    </div>
  </main>
  <footer id="footer" class="bottom"></footer>
</body>
<script type="application/javascript" src="/app/lib/jquery-4.0.0.min.js"></script>

<script type="module" src="/app/dist/app.js"></script>
<script type="module" src="/app/dist/eggs.js"></script>
<script type="module" src="/app/dist/debug-secret.js"></script>
<script type="module" src="/app/dist/audctrls.js"></script>
<script type="application/javascript" src="/app/dist/back.js"></script>
<script type="module" src="/app/dist/copyLinkBtn.js"></script>
<script type="module" src="/app/dist/footer.js"></script>

</html>
